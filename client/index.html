<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Journal</title>
  <link rel="stylesheet" href="src/style.css">
</head>
<body>

  <div class="container">

    <div class="date-nav">
      <button onclick="previousDay()">
        <img src="src/assets/left_arrow.png" alt="Previous">
      </button>
      <h1 id="date"></h1>
      <button onclick="nextDay()">
        <img src="src/assets/right_arrow.png" alt="Next">
      </button>
    </div>

    <textarea
      id="entry"
      placeholder="Write about your day..."
    ></textarea>

    <button onclick="saveEntry()">Save</button>
    <button onclick="logout()">Logout</button>

  </div>

  <script src="src/script.js"></script>
</body>
</html>
